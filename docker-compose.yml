
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      target: base
    command: npm run server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - redis

  webapp:
    build:
      context: .
      target: base
    command: npm run dev:web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  redis_data:
